<!doctype html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>Shortlink Logs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Consolas', 'SFMono-Regular', monospace;
            background: #1e1e2e;
            color: #cdd6f4;
            font-size: 13px;
        }
        .toolbar {
            position: sticky; top: 0; z-index: 10;
            background: #181825;
            padding: 8px 12px;
            display: flex; gap: 8px; align-items: center;
            border-bottom: 1px solid #313244;
        }
        .toolbar button {
            background: #313244; color: #cdd6f4; border: none;
            padding: 6px 14px; border-radius: 6px; cursor: pointer;
            font-size: 12px;
        }
        .toolbar button:hover { background: #45475a; }
        .toolbar .status { margin-left: auto; font-size: 12px; color: #a6adc8; }
        .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
        .dot.green { background: #a6e3a1; }
        .dot.red { background: #f38ba8; }
        #logs {
            padding: 8px 12px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-line { padding: 2px 0; }
        .log-line .time { color: #585b70; }
        .log-line .account { color: #89b4fa; font-weight: bold; }
        .log-line.ok { color: #a6e3a1; }
        .log-line.err { color: #f38ba8; }
        .log-line.warn { color: #f9e2af; }
        .log-line.info { color: #cdd6f4; }
        .log-line.captcha { color: #cba6f7; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="btn-clear">Clear</button>
        <button id="btn-scroll">Auto Scroll</button>
        <div class="status">
            <span class="dot" id="agent-dot"></span>
            <span id="agent-text">-</span>
        </div>
    </div>
    <div id="logs"></div>

    <script>
        const logsDiv = document.getElementById('logs');
        const agentDot = document.getElementById('agent-dot');
        const agentText = document.getElementById('agent-text');
        let autoScroll = true;

        document.getElementById('btn-clear').addEventListener('click', () => {
            logsDiv.innerHTML = '';
        });

        document.getElementById('btn-scroll').addEventListener('click', () => {
            autoScroll = !autoScroll;
            document.getElementById('btn-scroll').textContent = autoScroll ? 'Auto Scroll' : 'Manual Scroll';
        });

        window.electronAPI.onLog((entry) => {
            const div = document.createElement('div');
            div.className = 'log-line ' + (entry.cls || 'info');

            const time = new Date().toLocaleTimeString('th-TH', { hour12: false });
            const account = entry.account ? `[${entry.account}]` : '';

            div.innerHTML = `<span class="time">${time}</span> ${account ? '<span class="account">' + account + '</span> ' : ''}${entry.msg}`;
            logsDiv.appendChild(div);

            // Keep max 500 lines
            while (logsDiv.children.length > 500) logsDiv.removeChild(logsDiv.firstChild);

            if (autoScroll) window.scrollTo(0, document.body.scrollHeight);
        });

        window.electronAPI.onAgentStatus((running) => {
            agentDot.className = 'dot ' + (running ? 'green' : 'red');
            agentText.textContent = running ? 'Agent Running' : 'Agent Stopped';
        });
    </script>
</body>
</html>
