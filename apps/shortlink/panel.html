<!doctype html>
<html lang="th">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shortlink</title>
    <link rel="stylesheet" href="panel.css">
</head>

<body>
    <main class="panel">
        <div class="toolbar">
            <button id="btn-shopee" class="toolbar-btn" type="button">Shopee Affiliate</button>
            <button id="btn-agent-toggle" class="toolbar-btn" type="button">Agent</button>
        </div>

        <section class="card">
            <form id="form" novalidate>
                <label class="field">
                    <span>Shopee product URL</span>
                    <textarea id="product-url" rows="2" spellcheck="false"
                        placeholder="https://shopee.co.th/i-i.144517639.8096667672"></textarea>
                </label>

                <div class="subid-grid">
                    <label class="field compact">
                        <span>Sub ID 1</span>
                        <input id="sub1" type="text" autocomplete="off" placeholder="yok">
                    </label>
                    <label class="field compact">
                        <span>Sub ID 2</span>
                        <input id="sub2" type="text" autocomplete="off" placeholder="InstagramFeed">
                    </label>
                    <label class="field compact">
                        <span>Sub ID 3</span>
                        <input id="sub3" type="text" autocomplete="off" placeholder="1212BirthdaySale">
                    </label>
                    <label class="field compact">
                        <span>Sub ID 4</span>
                        <input id="sub4" type="text" autocomplete="off" placeholder="optional">
                    </label>
                    <label class="field compact">
                        <span>Sub ID 5</span>
                        <input id="sub5" type="text" autocomplete="off" placeholder="optional">
                    </label>
                </div>

                <div class="actions">
                    <button id="btn-shorten" class="primary" type="submit">Shorten</button>
                    <button id="btn-clear" class="ghost" type="button">Clear</button>
                </div>
            </form>

            <p id="status" class="status hide" role="status"></p>

            <div id="result" class="result-container hide">
                <div class="result-box">
                    <input type="text" id="short-link" readonly />
                    <button type="button" id="btn-copy" class="icon-btn" title="Copy">
                        <svg id="icon-copy" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor"
                            stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        <svg id="icon-check" class="hide" viewBox="0 0 24 24" width="18" height="18" fill="none"
                            stroke="#10854e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <section id="agent-section" class="card hide">
            <div class="agent-header">
                <div class="agent-status">
                    <span id="agent-dot" class="dot"></span>
                    <span id="agent-status-text">Stopped</span>
                </div>
                <div class="agent-actions">
                    <button id="btn-agent-start" class="small-btn primary" type="button">Start</button>
                    <button id="btn-agent-stop" class="small-btn ghost" type="button" disabled>Stop</button>
                </div>
            </div>
            <label class="field compact">
                <span>Worker URL</span>
                <input id="worker-url" type="text" autocomplete="off"
                    placeholder="https://shortlink-xxx.workers.dev">
            </label>
            <button id="btn-save-config" class="small-btn ghost" type="button" style="align-self:flex-end">Save</button>
            <div id="agent-log" class="agent-log"></div>
        </section>
    </main>

    <script src="panel.js"></script>
</body>

</html>
