services:
  browsersaving-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: browsersaving-web-standalone
    restart: unless-stopped
    ports:
      - "${BROWSERSAVING_WEB_BIND:-127.0.0.1}:${BROWSERSAVING_WEB_PORT:-18081}:80"
    environment:
      VITE_SERVER_URL: "${VITE_SERVER_URL:-https://browsersaving-worker.yokthanwa1993-bc9.workers.dev}"
      VITE_BROWSERSAVING_API_URL: "${VITE_BROWSERSAVING_API_URL:-https://browsersaving-api.lslly.com}"
      VITE_COMMENT_TOKEN_SERVICE_URL: "${VITE_COMMENT_TOKEN_SERVICE_URL:-https://token.lslly.com/api/comment-token}"
      VITE_REMOTE_LAUNCHER_URL: "${VITE_REMOTE_LAUNCHER_URL:-https://browsersaving-api.lslly.com}"
