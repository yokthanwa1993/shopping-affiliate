<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lazada Dashboard</title>
  <style>
    :root {
      --bg: #fff8f3;
      --panel: #ffffff;
      --text: #2b1e17;
      --muted: #7d6d63;
      --line: #ecd8cc;
      --brand: #f57224;
      --brand-deep: #d95f1d;
      --good: #1f9d62;
      --warn: #b26a00;
      --bad: #cc3344;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(245, 114, 36, 0.18), transparent 22rem),
        linear-gradient(180deg, #fffaf7 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 40px;
      line-height: 1;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.9);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 18px 50px rgba(112, 72, 34, 0.08);
    }
    .label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .value {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .sub {
      color: var(--muted);
      font-size: 14px;
      word-break: break-word;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .primary { background: var(--brand); color: white; }
    .primary:hover { background: var(--brand-deep); }
    .secondary { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .good { background: #eaf8f1; color: var(--good); }
    .bad { background: #ffecef; color: var(--bad); }
    .log {
      min-height: 360px;
      max-height: 360px;
      overflow: auto;
      padding: 14px;
      border-radius: 18px;
      background: #171412;
      color: #f7efe9;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid #332822;
    }
    .entry { margin: 0 0 8px; white-space: pre-wrap; word-break: break-word; }
    .entry.ok { color: #6fe1a6; }
    .entry.warn { color: #ffd177; }
    .entry.err { color: #ff8a99; }
    .entry.info { color: #91d5ff; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; }
      .wrap { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>Lazada Agent Dashboard</h1>
        <p>หน้าหลักสำหรับสถานะ agent, session login และ log การทำงานของ API</p>
      </div>
      <div class="badge" id="accountBadge">account: default</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Agent</div>
        <div class="value" id="agentStatus">...</div>
        <div class="sub" id="workerUrl">-</div>
      </div>
      <div class="card">
        <div class="label">Session</div>
        <div class="value" id="sessionStatus">...</div>
        <div class="sub" id="sessionMeta">-</div>
      </div>
      <div class="card">
        <div class="label">Account</div>
        <div class="value" id="accountName">default</div>
        <div class="sub">ใช้ session เดียวสำหรับยิง Lazada API และเก็บ cookie</div>
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="openLogin">Open Lazada Login</button>
      <button class="good" id="startAgent">Start Agent</button>
      <button class="bad" id="stopAgent">Stop Agent</button>
      <button class="secondary" id="refreshStatus">Refresh Status</button>
    </div>

    <div class="card">
      <div class="label">Logs</div>
      <div class="log" id="log"></div>
    </div>
  </div>
  <script src="./dashboard.js"></script>
</body>
</html>
